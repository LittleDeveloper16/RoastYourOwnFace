<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FACE ROAST 3000</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💀 FACE ROAST 3000 💀</h1>

<div class="container">

  <!-- BOX KAMERA -->
  <div class="box">
    <video id="video" autoplay playsinline></video>
    <img id="preview">
  </div>

  <!-- CONTROL -->
  <div class="controls">
    <button onclick="startCamera()">🎥 Kamera</button>
    <button onclick="takePhoto()">📸 Ambil Foto</button>
    <br>
    <input type="file" id="upload" accept="image/*">
    <br>
    <button onclick="analyze()">🔥 Roast Gw</button>
  </div>

</div>

<p id="result">Sistem menunggu korban berikutnya 😈</p>

<script src="script.js"></script>
</body>
</html>
